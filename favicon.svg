<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark teal rounded square background -->
  <rect width="32" height="32" rx="7" fill="#0d3b38"/>
  <!-- Exponential growth curve: flat start bottom-left, sweeps up to top-right -->
  <path d="M5 27 C13 27 19 15 27 5" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"/>
